<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>出门定心丸 Pro - 自适应版</title>
    <style>
        /* 1. 基础样式与移动端重置 */
        :root {
            --bg-color: #e0e5ec;
            --text-color: #374151;
            --sub-text-color: #6b7280;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --active-color: #4cd964; /* 绿色 */
            --delete-color: #ff3b30; /* 红色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 禁止长按选中文本，提升APP感 */
            user-select: none;
            -webkit-touch-callout: none;
            /* 移除移动端点击高亮阴影 */
            -webkit-tap-highlight-color: transparent;
            /* 移除按钮默认外观 */
            -webkit-appearance: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* 适配 iPhone 刘海屏底部 */
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom)) 15px;
        }

        /* 2. 主应用容器：自适应宽度 */
        .app-container {
            width: 100%;
            max-width: 500px; /* 限制大屏显示 */
            display: flex;
            flex-direction: column;
            gap: 18px; /* 元素间距 */
        }

        /* 3. 头部：缩小以腾出屏幕空间 */
        header {
            text-align: center;
            padding: 5px 0;
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 3px;
        }

        header p {
            font-size: 12px;
            color: var(--sub-text-color);
        }

        /* 时钟：缩小 */
        #live-clock {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 15px;
            font-size: 14px;
            font-weight: 600;
            background: var(--bg-color);
            border-radius: 50px;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
        }

        /* 4. 打卡网格：完美自适应 */
        #check-grid {
            display: grid;
            /* 核心：自动填充列，最小 140px，最大 1fr */
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .check-item-container {
            position: relative;
        }

        /* 打卡按钮 */
        .check-item {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 130px; /* 缩小高度 */
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                        -6px -6px 12px var(--shadow-light);
        }

        /* 点击/激活效果 */
        .check-item:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), 
                        inset -3px -3px 6px var(--shadow-light);
            transform: scale(0.97);
        }

        .check-item.active {
            background-color: var(--active-color);
            color: #ffffff;
            box-shadow: none;
            filter: drop-shadow(0 0 5px rgba(76, 217, 100, 0.3));
        }

        /* 5. 纯 CSS 图标 (保持简约) */
        .icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }

        /* 门锁图标 */
        .icon-lock::before { content: ''; position: absolute; width: 18px; height: 24px; border: 3px solid currentColor; border-radius: 4px; top: 10px; }
        .icon-lock::after { content: ''; position: absolute; width: 10px; height: 14px; border: 3px solid currentColor; border-bottom: none; border-radius: 5px 5px 0 0; top: 1px; }

        /* 空调图标 */
        .icon-ac::before { content: ''; position: absolute; width: 30px; height: 18px; border: 3px solid currentColor; border-radius: 4px; }
        .icon-ac::after { content: ''; position: absolute; width: 4px; height: 4px; background: currentColor; border-radius: 50%; right: 5px; bottom: 14px; }

        /* 通用图标 (如卷发棒) */
        .icon-generic::before { content: ''; position: absolute; width: 18px; height: 12px; border: 3px solid currentColor; border-radius: 3px; top: 9px; }
        .icon-generic::after { content: ''; position: absolute; width: 3px; height: 9px; background: currentColor; top: 22px; }
        .icon-generic-prong { position: absolute; width: 3px; height: 7px; background: currentColor; top: 2px; }
        .prong-l { left: 11px; }
        .prong-r { right: 11px; }

        .label { font-size: 14px; font-weight: 600; text-align: center; padding: 0 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .status { font-size: 10px; opacity: 0.7; }
        .check-item.active .status { opacity: 1; }

        /* 删除按钮：移动端长按显示 */
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            background-color: var(--delete-color);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 5;
        }
        
        /* 移动端特殊：只有在显示删除模式下才可见 */
        .show-delete .delete-btn {
            opacity: 1;
        }

        /* 6. 管理面板 */
        .management-panel {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 15px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .management-panel h3 { font-size: 16px; text-align: center; }

        .add-controls {
            display: flex;
            gap: 8px;
        }

        /* 输入框：缩小 */
        #new-item-name {
            flex-grow: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 13px;
            outline: none;
            box-shadow: inset 2px 2px 5px var(--shadow-dark), 
                        inset -2px -2px 5px var(--shadow-light);
        }

        /* 添加按钮 */
        #add-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow-dark), 
                        -3px -3px 6px var(--shadow-light);
        }
        #add-btn:active {
            box-shadow: inset 2px 2px 4px var(--shadow-dark), 
                        inset -2px -2px 4px var(--shadow-light);
        }

        /* 7. 定心丸面板：缩小 */
        .reassurance-panel {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 18px;
            text-align: center;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
        }
        .reassurance-panel h2 { font-size: 16px; margin-bottom: 8px; }
        #reassurance-msg { font-size: 13px; line-height: 1.4; color: var(--sub-text-color); }
        #last-check-time { font-weight: 700; color: var(--text-color); }

        footer { text-align: center; font-size: 10px; color: var(--sub-text-color); padding: 5px 0; line-height: 1.4; }

    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>出门定心丸 Pro</h1>
            <p>您的自定义OCD记录器 (自适应版)</p>
            <div id="live-clock">--:--:--</div>
        </header>

        <div id="check-grid">
            </div>

        <div class="management-panel">
            <h3>管理检查项目</h3>
            <div class="add-controls">
                <input type="text" id="new-item-name" placeholder="项目名(如:卷发棒)" maxlength="8">
                <button id="add-btn" onclick="addNewItem()">添加</button>
            </div>
        </div>

        <div class="reassurance-panel">
            <h2>地铁安心看</h2>
            <p id="reassurance-msg">早上还在焦虑吗？赶紧打卡吧！</p>
        </div>

        <footer>数据每天午夜12点自动清零。<br>长按打卡项目可显示/隐藏删除按钮。</footer>
    </div>

    <script>
        // --- 1. 数据结构与初始化 ---
        
        // 默认项目
        const defaultItems = [
            { id: 1, label: '门已反锁', icon: 'lock', time: '' },
            { id: 2, label: '空调已关', icon: 'ac', time: '' }
        ];

        // 尝试读取本地缓存
        let checkItems = JSON.parse(localStorage.getItem('ocd_pro_items')) || defaultItems;

        // --- 2. 渲染网格 (核心实现自适应DOM) ---
        function renderGrid() {
            const gridEl = document.getElementById('check-grid');
            gridEl.innerHTML = ''; // 清空
            let lastGlobalTime = '';

            checkItems.forEach(item => {
                // 1. 创建容器
                const container = document.createElement('div');
                container.className = 'check-item-container';

                // 2. 创建主打卡按钮
                const button = document.createElement('button');
                button.className = `check-item ${item.time ? 'active' : ''}`;
                
                // 触摸事件处理（防止誤触和点击延迟）
                let touchTimer;
                button.ontouchstart = (e) => {
                    touchTimer = setTimeout(() => {
                        // 长按逻辑：显示删除按钮
                        container.classList.toggle('show-delete');
                    }, 600); // 600ms 算长按
                };
                button.ontouchend = (e) => {
                    clearTimeout(touchTimer); // 如果在此之前抬起，则不是长按
                };

                // 普通点击逻辑
                button.onclick = (e) => {
                    // 如果正在显示删除按钮，点击按钮会隐藏删除按钮，而不是打卡
                    if (container.classList.contains('show-delete')) {
                        container.classList.remove('show-delete');
                        return;
                    }
                    doCheckPro(item.id);
                };

                // 3. 图标 DOM
                const iconDiv = document.createElement('div');
                iconDiv.className = `icon icon-${item.icon}`;
                if (item.icon === 'generic') {
                    iconDiv.innerHTML = '<div class="icon-generic-prong prong-l"></div><div class="icon-generic-prong prong-r"></div>';
                }

                // 文字
                const labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                labelSpan.innerText = item.label;

                // 状态时间
                const statusSpan = document.createElement('span');
                statusSpan.className = 'status';
                statusSpan.innerText = item.time ? `已确认 ${item.time}` : '未打卡';

                // 组装按钮
                button.appendChild(iconDiv);
                button.appendChild(labelSpan);
                button.appendChild(statusSpan);

                // 4. 创建删除按钮 (小叉叉)
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.innerText = '×';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation(); // 防止触发打卡
                    deleteItem(item.id);
                };

                // 5. 组装容器
                container.appendChild(button);
                container.appendChild(deleteBtn);
                gridEl.appendChild(container);

                if (item.time) lastGlobalTime = item.time;
            });

            // 更新底部的定心丸消息
            if (lastGlobalTime) {
                updateReassuranceMessage(lastGlobalTime);
            } else {
                document.getElementById('reassurance-msg').innerText = '还在焦虑吗？赶紧打卡吧！';
            }
        }

        // --- 3. 功能逻辑 ---

        // 核心打卡
        function doCheckPro(itemId) {
            const now = new Date();
            const exactTimeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            
            checkItems = checkItems.map(item => {
                if (item.id === itemId) {
                    return { ...item, time: exactTimeStr };
                }
                return item;
            });

            saveAndRender();
        }

        // 添加新项目
        function addNewItem() {
            const inputEl = document.getElementById('new-item-name');
            const name = inputEl.value.trim();

            if (!name) { alert('请输入项目名'); return; }
            if (checkItems.some(item => item.label === name)) { alert('该项目已存在'); return; }
            if (checkItems.length >= 12) { alert('项目太多啦 (最多12个)'); return; }

            checkItems.push({
                id: Date.now(),
                label: name,
                icon: 'generic', // 默认通用图标
                time: ''
            });
            inputEl.value = ''; // 清空输入框
            document.activeElement.blur(); // 隐藏键盘
            saveAndRender();
        }

        // 删除项目
        function deleteItem(itemId) {
            // 简单确认
            if (!confirm('确定删除此项？')) return;
            checkItems = checkItems.filter(item => item.id !== itemId);
            saveAndRender();
        }

        // 保存并渲染
        function saveAndRender() {
            localStorage.setItem('ocd_pro_items', JSON.stringify(checkItems));
            renderGrid();
        }

        // 更新定心丸消息
        function updateReassuranceMessage(timeStr) {
            const msgEl = document.getElementById('reassurance-msg');
            msgEl.innerHTML = `你今天早上 <span id="last-check-time">${timeStr}</span> 已完成最近一次安全检查。放心去飞吧！安好！`;
        }

        // 午夜自动清零时间
        function checkDailyResetPro() {
            const lastCheckDate = localStorage.getItem('last_check_date_pro');
            const today = new Date().toISOString().slice(0, 10);

            if (lastCheckDate && lastCheckDate !== today) {
                // 跨天了，清空所有项目的时间，保留项目列表本身
                checkItems = checkItems.map(item => ({ ...item, time: '' }));
                localStorage.setItem('ocd_pro_items', JSON.stringify(checkItems));
                localStorage.removeItem('last_check_date_pro');
            }
            localStorage.setItem('last_check_date_pro', today);
        }

        // 时钟
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('live-clock').innerText = timeStr;
        }

        // --- 4. 初始化 ---
        setInterval(updateClock, 1000);
        updateClock();
        checkDailyResetPro(); // 检查跨天
        renderGrid(); // 渲染

    </script>
</body>
</html>
